<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conference Deadline Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="top-nav" aria-label="Main navigation">
      <div class="top-nav-inner">
        <a class="brand" href="./index.html">XR-Ed Lab</a>
      </div>
    </nav>

    <header class="page-header">
      <h1>Conference Deadlines</h1>
      <p>Schedules, submission timelines, and planning notes for venues we care about.</p>
    </header>

    <main class="layout">
      <section class="controls" aria-label="Filters">
        <div class="controls-row">
          <input id="search-input" type="search" placeholder="Search conferences..." />
          <label class="checkbox">
            <input id="show-past" type="checkbox" />
            <span>Show past deadlines</span>
          </label>
        </div>
        <div
          id="category-filter"
          class="category-filter"
          role="group"
          aria-label="Filter by category"
        ></div>
      </section>

      <section id="meta" class="meta"></section>
      <section id="deadline-list" class="rows" aria-live="polite"></section>
    </main>

    <template id="row-template">
      <article class="row">
        <div class="left-col">
          <div class="title-line">
            <h2 class="conf-name"><a class="conf-name-link"></a></h2>
            <a class="conf-link" target="_blank" rel="noreferrer" aria-label="Conference website">🌐</a>
          </div>
          <p class="event-line"></p>
          <p class="full-name"></p>
          <div class="categories"></div>
        </div>

        <div class="right-col">
          <div class="deadline-items"></div>
        </div>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
