<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conference Deadline Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Conference Deadline Tracker</h1>
      <p>
        Internal dashboard for tracking submissions across lab-target conferences for XRED Lab.
      </p>
    </header>

    <main class="layout">
      <section class="controls" aria-label="Filters">
        <label>
          Search
          <input id="search-input" type="search" placeholder="e.g., CHI, XR, learning" />
        </label>

        <label>
          Category
          <select id="category-filter">
            <option value="all">All categories</option>
          </select>
        </label>

        <label>
          Sort
          <select id="sort-select">
            <option value="soonest">Soonest deadline first</option>
            <option value="latest">Latest deadline first</option>
            <option value="name">Conference name (A-Z)</option>
          </select>
        </label>

        <label>
          Display timezone
          <select id="timezone-mode">
            <option value="local">My local time</option>
            <option value="conference">Conference timezone</option>
            <option value="utc">UTC</option>
          </select>
        </label>

        <label class="checkbox">
          <input id="show-past" type="checkbox" />
          Show past deadlines
        </label>
      </section>

      <section id="meta" class="meta"></section>
      <section id="deadline-list" class="rows" aria-live="polite"></section>
    </main>

    <template id="row-template">
      <article class="row">
        <div class="row-main">
          <div class="row-head">
            <h2 class="conf-name"></h2>
            <span class="full-name"></span>
          </div>

          <p class="description"></p>

          <div class="event-block">
            <span class="event-label">Conference</span>
            <span class="event-edition"></span>
            <span class="event-dates"></span>
            <span class="event-location"></span>
            <span class="event-confirmed-flag"></span>
          </div>

          <div class="row-tags">
            <span class="categories"></span>
          </div>
        </div>

        <div class="row-side">
          <span class="status-badge"></span>
          <p class="deadline-label"></p>
          <p class="deadline-time"></p>
          <p class="countdown"></p>
          <p class="deadline-note"></p>
          <div class="row-actions">
            <a class="website-link" target="_blank" rel="noreferrer">Website</a>
            <a class="calendar-link">Add to calendar</a>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
