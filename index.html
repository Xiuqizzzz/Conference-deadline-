<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conference Deadline Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="top-nav" aria-label="Main navigation">
      <div class="top-nav-inner">
        <div class="top-nav-left">
          <span class="brand">XR-Ed Lab Deadlines</span>
        </div>
        <div class="top-nav-right">
          <a class="top-action" href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a>
          <a class="top-action" href="#deadline-list">Export .ics</a>
        </div>
      </div>
    </nav>

    <header class="page-header">
      <h1>⏰ XR-Ed Lab Conference Deadlines</h1>
      <p>Track conference schedules, submission timelines, and planning notes in one place.</p>
    </header>

    <main class="layout">
      <section class="controls" aria-label="Filters">
        <input id="search-input" type="search" placeholder="Search conferences..." />

        <select id="category-filter" aria-label="Category filter">
          <option value="all">All categories</option>
        </select>

        <label class="checkbox">
          <input id="show-past" type="checkbox" />
          <span>Show past deadlines</span>
        </label>
      </section>

      <section id="meta" class="meta"></section>
      <section id="deadline-list" class="rows" aria-live="polite"></section>
    </main>

    <template id="row-template">
      <article class="row">
        <div class="left-col">
          <div class="title-line">
            <h2 class="conf-name"></h2>
            <a class="conf-link" target="_blank" rel="noreferrer" aria-label="Conference website">🌐</a>
          </div>
          <p class="event-line"></p>
          <p class="full-name"></p>
          <p class="description"></p>
          <div class="categories"></div>
        </div>

        <div class="right-col">
          <div class="deadline-items"></div>
        </div>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
